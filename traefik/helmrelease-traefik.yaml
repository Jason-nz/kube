apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
  annotations:
    "kube-vip.io/loadbalancerIPs": "0.0.0.0"
spec:
  chart:
    spec:
      chart: traefik
      version: 10.x
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: traefik
  valuesFrom:
  - kind: ConfigMap
    name: traefik-values
