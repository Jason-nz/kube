ingress:
  enabled: true
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: nextcloud-nextcloud-middleware-headers@kubernetescrd,nextcloud-nextcloud-middleware-regex@kubernetescrd

nextcloud:
  host: files.thecullensnz.com
  existingSecret:
    enabled: true
    secretName: nextcloud-login
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password
  extraEnv:
    - name: OVERWRITEPROTOCOL
      value: https
    - name: OVERWRITEHOST
      value: files.thecullensnz.com
    - name: overwrite.cli.url
      value: https://files.thecullensnz.com
    # This is the Cluster Ip of the loadbalancer
    - name: TRUSTED_PROXIES
      value: 10.42.0.109
  extraVolumes:
    - name: before-starting-scripts
      configMap:
        name: before-starting-scripts
        defaultMode: 0550
  extraVolumeMounts:
    - name: before-starting-scripts
      mountPath: /docker-entrypoint-hooks.d/before-starting

image:
  repository: nextcloud
  tag: 31.0.2-fpm-alpine

nginx:
  enabled: true
  config:
    # This generates the default nginx config as per the nextcloud documentation
    default: true
    headers:
      # -- HSTS settings
      # WARNING: Only add the preload option once you read about
      # the consequences in https://hstspreload.org/. This option
      # will add the domain to a hardcoded list that is shipped
      # in all major browsers and getting removed from this list
      # could take several months.
      # Example:
      "Strict-Transport-Security": "max-age=15768000;"
      "Strict-Transport-Security": ""
      "Referrer-Policy": "no-referrer"
      "X-Content-Type-Options": "nosniff"
      "X-Download-Options": "noopen"
      "X-Frame-Options": "SAMEORIGIN"
      "X-Permitted-Cross-Domain-Policies": "none"
      "X-Robots-Tag": "noindex, nofollow"
      "X-XSS-Protection": "1; mode=block"


postgresql:
  enabled: true
  architecture: standalone
  global:
    postgresql:
      auth:
        username: nextcloud
        existingSecret: "nextcloud-database"
        secretKeys:
          adminPasswordKey: "database-admin-password"
          userPasswordKey: "database-user-password"
          replicationPasswordKey: "replication-password"
  primary:
    persistence:
      enabled: true

internalDatabase:
  enabled: false

externalDatabase:
  enabled: true
  type: postgresql
  user: nextcloud
  existingSecret:
    enabled: true
    secretName: "nextcloud-database"
    usernameKey: "database-user"
    passwordKey: "database-user-password"

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

cronjob:
  enabled: true

persistence:
  enabled: true
