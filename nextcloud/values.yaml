ingress:
  enabled: true
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: nextcloud-nextcloud-middleware-headers@kubernetescrd,nextcloud-nextcloud-middleware-regex@kubernetescrd

nextcloud:
  host: files.thecullensnz.com
  extraEnv:
    - name: OVERWRITEPROTOCOL
      value: https
    - name: OVERWRITEHOST
      value: files.thecullensnz.com
    - name: overwrite.cli.url
      value: https://files.thecullensnz.com
    # This is the Cluster Ip of the loadbalancer
    - name: TRUSTED_PROXIES
      value: 10.42.0.109

image:
  tag: 31.0.1-fpm-alpine

nginx:
  enabled: true

postgresql:
  enabled: true
  architecture: standalone
  global:
    postgresql:
      auth:
        password: "testing123456"
  primary:
    persistence:
      enabled: true

internalDatabase:
  enabled: false

externalDatabase:
  enabled: true
  type: postgresql
  password: "testing123456"

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

cronjob:
  enabled: true

persistence:
  enabled: true
