apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: crossplane
spec:
  chart:
    spec:
      chart: crossplane
      version: v1.x
      sourceRef:
        kind: HelmRepository
        name: crossplane
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: crossplane
  valuesFrom:
  - kind: ConfigMap
    name: crossplane-values
